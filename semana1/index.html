<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arena Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #hud {
            position: absolute;
            color: #0f0;
            font-family: monospace;
            text-shadow: 0 0 10px #0f0;
            pointer-events: none;
        }

        #ammo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 18px;
            text-align: right;
        }

        #health {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
        }

        #enemyHealth {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            text-align: right;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #0f0;
            border-radius: 50%;
            pointer-events: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #0f0;
        }

        #crosshair::before {
            width: 2px;
            height: 15px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin-top: -20px;
        }

        #crosshair::after {
            width: 2px;
            height: 15px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin-top: 5px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 48px;
            color: #f00;
            text-shadow: 0 0 20px #f00;
            display: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 3px solid #f00;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            max-width: 250px;
            line-height: 1.6;
        }

        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div class="damage-flash" id="damageFlash"></div>
    <div id="hud">
        <div id="health">Player HP: <span id="healthValue">100</span></div>
        <div id="enemyHealth">Enemy HP: <span id="enemyHealthValue">100</span></div>
        <div id="score" style="position: absolute; top: 70px; left: 20px; font-size: 16px;">
            Score: <span id="playerScoreValue">0</span> - <span id="enemyScoreValue">0</span>
        </div>
        <div id="ammo">Ammo: <span id="ammoValue">30</span>/30</div>
        <div id="instructions">
            Arrow Keys: Move<br>
            Ctrl: Shoot<br>
            Mouse: Look Around<br>
            R: Reload
        </div>
    </div>
    <div id="gameOver"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
